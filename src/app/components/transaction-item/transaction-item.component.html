<div class="transaction-item">

  <!-- Ícone tipo (receita / despesa) -->
  <div class="item-icon-wrapper" [class.receita-icon]="isReceita" [class.despesa-icon]="!isReceita">
    <img
      [src]="isReceita ? 'assets/icons/arrow-up-right.svg' : 'assets/icons/arrow-down-right.svg'"
      [alt]="isReceita ? 'Receita' : 'Despesa'"
      class="item-icon"
    />
  </div>

  <!-- Textos centrais: nome + valor -->
  <div class="item-info">
    <span class="item-descricao">{{ descricao }}</span>
    <span class="item-valor" [class.valor-receita]="isReceita" [class.valor-despesa]="!isReceita">
      {{ isReceita ? '+' : '-' }} {{ formatarMoeda(valor) }}
    </span>
  </div>

  <!-- Ações -->
  <div class="item-right">
    <div class="item-acoes">
      <!-- Lápis: editar -->
      <button type="button" class="btn-acao btn-editar" (click)="onEditar($event)" aria-label="Editar transação">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7" stroke="#00a765" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z" stroke="#00a765" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>

      <!-- Lixeira: deletar -->
      <button type="button" class="btn-acao btn-deletar" (click)="onDeletar($event)" aria-label="Deletar transação">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6M9 7V4a1 1 0 011-1h4a1 1 0 011 1v3M4 7h16" stroke="#ef3a3a" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
    </div>
  </div>

</div>
